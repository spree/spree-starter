# Render Blueprint — authored for the create-spree-app project layout
# (Rails API in backend/, optional customized React Dashboard in
# apps/dashboard/); create-spree-app relocates this file to your project
# root. The web service builds backend/Dockerfile with the repo root as
# context: your (ejected) backend customizations and your apps/dashboard
# ship in ONE image, with the dashboard served same-origin at /dashboard —
# no CORS, no cookie configuration, no second service. Without
# apps/dashboard the image bakes the stock dashboard. Migrations run from
# the image entrypoint on boot.
services:
  - type: web
    name: spree
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spree-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spree-redis
          type: redis
          property: connectionString
      # - key: REDIS_CACHE_URL
      #   fromService:
      #     name: spree-redis-cache
      #     type: redis
      #     property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_LEVEL
        value: info
      # uncomment on plans with 2+ vCPUs (pro and up) to run one Puma process per vCPU;
      # a Spree process needs ~1GB RAM, so this doesn't fit free/starter instances
      # - key: WEB_CONCURRENCY
      #   value: "2"

  # uncomment to add background jobs, requires standard (paid) plan
  # - type: worker
  #   name: spree-worker
  #   runtime: docker
  #   plan: standard
  #   dockerfilePath: ./backend/Dockerfile
  #   dockerContext: .
  #   dockerCommand: bundle exec sidekiq
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: spree-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         name: spree-redis
  #         type: redis
  #         property: connectionString
  #     - key: SECRET_KEY_BASE
  #       fromService:
  #         name: spree
  #         type: web
  #         envVarKey: SECRET_KEY_BASE
  #     - key: SIDEKIQ_CONCURRENCY
  #       value: "10"
  #     - key: RAILS_MAX_THREADS
  #       value: "12"
  #     - key: MALLOC_ARENA_MAX
  #       value: "2"

  - type: redis
    name: spree-redis
    plan: free
    # maxmemoryPolicy: noeviction
    ipAllowList: []

  # uncomment to enable dedicated cache redis
  # - type: redis
  #   name: spree-redis-cache
  #   plan: free
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

databases:
  - name: spree-db
    plan: free
    databaseName: spree
    postgresMajorVersion: "18"
    ipAllowList: []
