# Development: bind-mounts the app source into the container. Edits are hot.
# Use `spree dev` (which runs `docker compose up -d` against this file)
# or `docker compose -f docker-compose.dev.yml up -d`.
#
# All rails/rake/bundle/generator commands run INSIDE the container via
# `docker compose exec web …` (the @spree/cli wraps this). The host never
# executes Ruby or writes through these volumes, which is why this compose
# doesn't need a UID-matching entrypoint, init service, or chown step:
# container writes happen as UID 1000 (rails user), and Docker Desktop /
# OrbStack on macOS map bind-mount UIDs to the host user automatically;
# on Linux the host user is typically UID 1000 too.
#
# Adding a gem: `spree bundle add <gem>` — gems persist in the bundle_cache volume.
# Changing the Dockerfile or .ruby-version: `spree build` to rebuild the image.

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    target: dev
  depends_on:
    postgres:
      condition: service_healthy
    # Uncomment when enabling the optional meilisearch service below.
    # meilisearch:
    #   condition: service_healthy
    mailpit:
      condition: service_started
  env_file: .env
  environment:
    # database.yml builds dev/test configs from DATABASE_HOST/DATABASE_USERNAME
    # (port 5432 is its default). Deliberately NOT DATABASE_URL: a URL overrides
    # database.yml for every Rails env, so in-container rspec would hit the dev
    # DB and trip DatabaseCleaner's remote-URL safeguard. Both are pinned here
    # so native-dev values in .env (env_file above) can't leak into the container.
    DATABASE_HOST: postgres
    DATABASE_USERNAME: postgres
    SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    RAILS_FORCE_SSL: "false"
    RAILS_ASSUME_SSL: "false"
    # Dev runs more job threads than the production default of 3 — imports and
    # image processing finish fast, and there's no checkout traffic to protect.
    JOB_THREADS: ${JOB_THREADS:-10}
    # Product search runs on the database by default. To switch to Meilisearch,
    # uncomment this together with the meilisearch depends_on/service/volume
    # blocks, then reindex: spree rake spree:search:reindex
    # MEILISEARCH_URL: http://meilisearch:7700
    # All outgoing mail is captured by Mailpit — read it at http://localhost:8025.
    # Set SMTP_HOST (and friends) in .env to deliver through a real provider instead.
    SMTP_HOST: ${SMTP_HOST:-mailpit}
    SMTP_PORT: ${SMTP_PORT:-1025}
    # RAILS_ENV / BUNDLE_* are baked into the dev image (Dockerfile dev stage).
    BOOTSNAP_CACHE_DIR: /rails/tmp/cache/bootsnap
  volumes:
    # Bind-mount the source so host edits are live in the container.
    - .:/rails
    # Named volume over BUNDLE_PATH so the bind-mount doesn't shadow the gems
    # installed in the image, and so `bundle add` persists across container
    # restarts without a rebuild.
    - bundle_cache:/usr/local/bundle
    # Storage (ActiveStorage local disk, uploads).
    - storage_data:/rails/storage
    # Bootsnap + Rails tmp/cache don't churn the host filesystem.
    - tmp_cache:/rails/tmp
  # Empty tmpfs over public/assets so dev never serves the image's precompiled
  # manifest — Propshaft stays in Dynamic mode and compiles live, so admin CSS
  # rebuilds are served without a restart. tmpfs (not a volume) is used because a
  # fresh anonymous volume inherits the image's baked public/assets via copy-up,
  # which reintroduces the frozen manifest; tmpfs is always empty on start.
  tmpfs:
    - /rails/public/assets

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      # Forwarded for native DB clients (TablePlus, DataGrip, psql on host).
      # Default 5433 avoids collision with a host-native Postgres on 5432.
      # Bound to loopback: this postgres runs passwordless (trust auth), and a
      # 0.0.0.0 publish bypasses host firewalls on Linux (Docker inserts its
      # NAT rules ahead of ufw/firewalld), exposing it to the local network.
      - "127.0.0.1:${SPREE_DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional Meilisearch search provider (typo tolerance, instant facets).
  # Uncomment together with the meilisearch lines under x-app's depends_on and
  # environment, and the meilisearch_data volume at the bottom.
  # meilisearch:
  #   image: getmeili/meilisearch:latest
  #   volumes:
  #     - meilisearch_data:/meili_data
  #   ports:
  #     # Forwarded for the Meilisearch dashboard / host debugging. Loopback for
  #     # the same reason as postgres: no API key is set in dev.
  #     - "127.0.0.1:${SPREE_MEILISEARCH_PORT:-7700}:7700"
  #   healthcheck:
  #     test: curl -f http://localhost:7700/health || exit 1
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      # Loopback-only, matching meilisearch: reachable from the host browser
      # but not the LAN (Docker's NAT rules bypass host firewalls on Linux).
      # 8025 = web UI — open http://localhost:8025 to read captured mail.
      # 1025 = SMTP endpoint the app delivers to (in-cluster as mailpit:1025).
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # One app container: Puma also runs Solid Queue's job supervisor
  # in-process (SOLID_QUEUE_IN_PUMA, on by default) — no separate worker.
  web:
    <<: *app
    # The dev stage already has dev/test gems installed, so no runtime
    # bundle install is needed. We do bypass bin/docker-entrypoint (it runs
    # db:prepare + assets:precompile, which is wrong for dev — first-time
    # setup goes through `spree init`).
    command: ["bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    ports:
      - "${SPREE_PORT:-3000}:3000"

volumes:
  postgres_data:
  # meilisearch_data:
  storage_data:
  bundle_cache:
  tmp_cache:
