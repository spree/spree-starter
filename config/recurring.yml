# Recurring jobs (Solid Queue's cron replacement — no sidekiq-cron/whenever).
# See https://github.com/rails/solid_queue#recurring-tasks
#
# Add your own like:
#   nightly_report:
#     class: MyReportJob
#     queue: spree_reports
#     schedule: at 5am every day
production:
  # Release checkout stock reservations whose hold expired, so inventory
  # returns to sellable stock promptly.
  expire_stock_reservations:
    class: Spree::StockReservations::ExpireJob
    schedule: every minute

  # EU Omnibus price history: keep the lowest-price window queryable while
  # pruning records past the retention period (Spree::Config
  # price_history_retention_days, default 30).
  prune_price_history:
    command: "Spree::PriceHistory.where('recorded_at < ?', (Spree::Config[:price_history_retention_days] || 30).days.ago).in_batches(of: 1000).delete_all"
    schedule: at 4am every day

  # Solid Queue / Solid Cable housekeeping.
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  clear_solid_cable_messages:
    command: "SolidCable::Message.prunable.in_batches(of: 1000).delete_all"
    schedule: every hour at minute 42
