default: &default
  adapter: postgresql
  encoding: unicode
  # With the Solid Queue supervisor inside Puma (the default), this pool
  # serves Puma's threads, the job worker threads, and ~3 Solid Queue
  # internals (dispatcher, scheduler, supervisor):
  #   pool = RAILS_MAX_THREADS + JOB_THREADS + 3
  pool: <%= Integer(ENV.fetch("RAILS_MAX_THREADS", 3)) + Integer(ENV.fetch("JOB_THREADS", 3)) + 3 %>

development:
  <<: *default
  database: spree_development
  username: <%= ENV.fetch("DATABASE_USERNAME") { 'postgres' } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 }.to_i %>

test:
  <<: *default
  database: spree_test
  username: <%= ENV.fetch("DATABASE_USERNAME") { 'postgres' } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 }.to_i %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
